{% extends "layout.html" %}

{% block title %}Registrarse{% endblock %}

{% block main %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <h2 class="text-center mb-4">Crear una Cuenta</h2>

        <form action="/register" method="post" class="card p-4 shadow-sm">
            <div class="mb-3">
                <label for="username" class="form-label">Nombre de Usuario</label>
                <input autocomplete="off" autofocus class="form-control" id="username" name="username" type="text" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input class="form-control" id="password" name="password" type="password" required>
            </div>

            <div class="mb-4">
                <label for="confirmation" class="form-label">Confirmar Contraseña</label>
                <input class="form-control" id="confirmation" name="confirmation" type="password" required>
            </div>

            <button class="btn btn-primary w-100" type="submit">Registrarse</button>
        </form>

        <div class="text-center mt-3">
            <p>¿Ya tienes cuenta? <a href="/login">Inicia sesión aquí</a></p>
        </div>
    </div>
</div>
{% endblock %}
