{% extends "layout.html" %}

{% block title %}Agregar Producto{% endblock %}

{% block main %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">➕ Agregar Nuevo Producto</h4>
            </div>
            <div class="card-body p-4">
                <form action="/add" method="post">
                    <div class="mb-3">
                        <label for="name" class="form-label">Nombre del Producto</label>
                        <input autocomplete="off" autofocus class="form-control" id="name" name="name" type="text" placeholder="Ej: Bebida Coca-Cola 1.5L" required>
                    </div>

                    <div class="row mb-3">
                        <div class="col">
                            <label for="buy_price" class="form-label">Precio de Compra ($)</label>
                            <input class="form-control" id="buy_price" name="buy_price" type="number" min="0" step="0.01" placeholder="Costo" required>
                        </div>
                        <div class="col">
                            <label for="sell_price" class="form-label">Precio de Venta ($)</label>
                            <input class="form-control" id="sell_price" name="sell_price" type="number" min="0" step="0.01" placeholder="Público" required>
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col">
                            <label for="stock" class="form-label">Stock Actual</label>
                            <input class="form-control" id="stock" name="stock" type="number" min="0" placeholder="Ej: 20" required>
                        </div>
                        <div class="col">
                            <label for="min_stock" class="form-label">Alerta Stock Mínimo</label>
                            <input class="form-control" id="min_stock" name="min_stock" type="number" min="0" value="5" required>
                        </div>
                    </div>

                    <button class="btn btn-primary w-100" type="submit">Guardar Producto</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
